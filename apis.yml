---
aid: deakin
name: Deakin University
description: >-
  Deakin University is a public research university in Victoria, Australia, with
  campuses in Geelong, Warrnambool and Melbourne, ranked #197 in the QS World
  University Rankings 2025. Like most universities, Deakin operates an
  integration-heavy IT estate (its SSO is a Shibboleth/SAML2 identity provider)
  but does not publish a public, self-service developer API portal. Its
  confirmed public, machine-readable footprint is concentrated in research
  infrastructure: the Deakin Research Online (DRO) repository runs on figshare
  (which exposes a public OAI-PMH and REST API), a public Data Portal for sharing
  research datasets, and an active GitHub organization. Most catalogued surfaces
  below are third-party-hosted or gated rather than first-party, documented APIs.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
