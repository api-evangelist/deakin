apis:
  - aid: deakin:dro-oai
    name: Deakin Research Online (DRO) OAI-PMH
    description: >-
      Deakin Research Online is the university's research repository, now hosted
      on the figshare platform. It exposes research-output metadata for harvesting
      via the OAI-PMH protocol. The DRO host issues a bot-challenge response to
      automated clients; the underlying figshare OAI-PMH service is publicly
      reachable.
    humanURL: https://dro.deakin.edu.au/
    baseURL: https://api.figshare.com/v2/oai
    tags: [ Research, Repository, OAI-PMH, Metadata, figshare ]
    properties:
      - type: Documentation
        url: https://info.figshare.com/user-guide/how-to-use-figshares-oai-pmh-service/
  - aid: deakin:figshare-api
    name: figshare REST API (DRO platform)
    description: >-
      Deakin Research Online runs on figshare, whose public REST API (v2) provides
      programmatic access to articles, collections and metadata across hosted
      institutional repositories. This is a third-party platform API underpinning
      DRO rather than a Deakin-branded API.
    humanURL: https://docs.figshare.com/
    baseURL: https://api.figshare.com/v2
    tags: [ Research, Repository, REST, figshare ]
    properties:
      - type: Documentation
        url: https://docs.figshare.com/
      - type: OpenAPI
        url: openapi/deakin-figshare-api.yaml
      - type: JSONSchema
        url: json-schema/deakin-article-schema.json
      - type: JSONStructure
        url: json-structure/deakin-article-structure.json
      - type: Examples
        url: examples/deakin-get-article-example.json
      - type: Rules
        url: rules/deakin-rules.yml
      - type: Vocabulary
        url: vocabulary/deakin-vocabulary.yml
      - type: JSONLD
        url: json-ld/deakin-context.jsonld
  - aid: deakin:data-portal
    name: Deakin Data Portal
    description: >-
      A public portal for Deakin researchers and research groups to share data and
      collected materials with the Australian research community. It is a
      web-delivered data-sharing platform; no documented public API was confirmed,
      so it is catalogued as a data property rather than a documented API surface.
    humanURL: https://dataportal.deakin.edu.au/
    tags: [ Open Data, Research, Data Portal ]
    properties:
      - type: Documentation
        url: https://dataportal.deakin.edu.au/
  - aid: deakin:sso
    name: Deakin Single Sign-On (Shibboleth/SAML2 IdP)
    description: >-
      Deakin operates a Shibboleth/SAML2 identity provider for single sign-on
      across university systems. The IdP metadata endpoint is publicly reachable,
      but this is federated SSO infrastructure for relying parties, not a
      documented public OAuth/OpenID developer API.
    humanURL: https://signon.deakin.edu.au/
    baseURL: https://signon.deakin.edu.au/idp/shibboleth
    tags: [ Identity, SSO, SAML, Shibboleth, Authentication ]
    properties:
      - type: Documentation
        url: https://help.deakin.edu.au/login_locate_sso.do
